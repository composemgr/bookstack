# nginx proxy address - http://172.17.0.1:8096

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  bookstack:
    image: bookstack/bookstack:latest
    container_name: bookstack-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - bookstack
    ports:
      - "8096:8096"
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./rootfs/data/bookstack:/data
      - ./rootfs/config/bookstack:/config
    depends_on:
      - bookstack-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096"]
      interval: 30s
      timeout: 10s
      retries: 3

  bookstack-db:
    image: mariadb:11
    container_name: bookstack-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - bookstack
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-bookstack}
      MARIADB_USER: ${DB_USER_NAME:-bookstack}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_root_password}
    volumes:
      - ./rootfs/data/db/mariadb/bookstack:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bookstack:
    external: false
