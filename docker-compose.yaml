# nginx proxy address - http://172.17.0.1:8096

name: bookstack
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    pull_policy: always
    container_name: bookstack-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    networks:
      - bookstack
    ports:
      - "172.17.0.1:8096:80"
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
      APP_URL: https://${BASE_HOST_NAME:-$HOSTNAME}
      APP_KEY: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      DB_HOST: bookstack-db
      DB_PORT: 3306
      DB_DATABASE: ${DB_CREATE_DATABASE_NAME:-bookstack}
      DB_USERNAME: ${DB_USER_NAME:-bookstack}
      DB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MAIL_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      MAIL_PORT: ${EMAIL_SERVER_PORT:-587}
      MAIL_USERNAME: ${EMAIL_SERVER_LOGIN_NAME:-}
      MAIL_PASSWORD: ${EMAIL_SERVER_LOGIN_PASS:-}
    volumes:
      - ./volumes/data/bookstack:/config
    depends_on:
      bookstack-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  bookstack-db:
    image: mariadb:latest
    pull_policy: always
    container_name: bookstack-db
    hostname: bookstack-db
    restart: always
    logging: *default-logging
    networks:
      - bookstack
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-bookstack}
      MARIADB_USER: ${DB_USER_NAME:-bookstack}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    volumes:
      - ./volumes/data/db/mariadb/bookstack:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bookstack:
    name: bookstack
    external: false
